name: Staging

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['Web.App/**', .github/workflows/build.yml, .github/workflows/staging.yml]

jobs:
  staging:
    name: Staging environment

    permissions:
      contents: read
      deployments: write

    uses: kappaduck/kappaduck/.github/workflows/build.yml@main
    with:
      environment: staging
    secrets: inherit
